# The reverse proxy in front of gunicorn.
#
# It exists for one reason this project cares about: a meeting recording is
# uploaded through it. Django receives the bytes — there is no object storage
# and no browser-to-bucket upload — so the proxy has to be told to allow an
# upload the application is willing to accept, and to refuse one it is not.
#
# THE UPLOAD LIMIT IS DECLARED TWICE AND MUST MATCH.
#
#   meetings/uploads.py   MAX_UPLOAD_BYTES = 500 * 1024 * 1024   (500 MB)
#   this file             client_max_body_size 500m;
#
# Changing one without the other produces exactly the failure the limit is
# there to avoid. Too low here and a file the application would have accepted
# dies on nginx's own 413 page, which says nothing a facilitator can act on.
# Too high here and nothing is gained: the application refuses it anyway, on
# the request's declared length, before it reads the body.

upstream feedback_app {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    # Matches meetings/uploads.py MAX_UPLOAD_BYTES (500 MB). See the note above:
    # these two are one limit written in two places.
    client_max_body_size 500m;

    # Hand the body straight to gunicorn rather than spooling the whole
    # recording to the proxy's disk first. Django streams it to the shared
    # scratch volume itself, and a 500 MB file buffered here would be written
    # twice for no reason.
    proxy_request_buffering off;

    # A long upload occupies a worker for its duration — by design; the answer
    # is a handful of gunicorn workers, not threads or async in the view. These
    # timeouts are what stop a slow but healthy upload from being cut off.
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    client_body_timeout 300s;

    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 30d;
    }

    location / {
        proxy_pass http://feedback_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
