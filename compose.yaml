name: project-feedback

services:
  db:
    image: postgres:18
    # Postgres defaults to 100 connections. One container serves every git
    # worktree, and `conn_max_age` keeps each Django process's connection open
    # for ten minutes, so a handful of parallel agents running suites, dev
    # servers and browser checks exhausts it - one worktree was measured
    # holding 68 on its own. The symptom is `FATAL: sorry, too many clients
    # already` surfacing as 500s that look like a bug in whatever was being
    # tested. Raising this is cheaper than chasing that twice.
    command: ["postgres", "-c", "max_connections=300"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: feedback
    ports:
      # Exposed so the suite can also be run on the host with `uv run pytest`.
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d feedback"]
      interval: 5s
      timeout: 5s
      retries: 12

  web:
    build: .
    command: uv run manage.py runserver 0.0.0.0:8000
    environment:
      DEBUG: "true"
      SECRET_KEY: django-insecure-development-only-key
      ALLOWED_HOSTS: localhost,127.0.0.1,web
      DATABASE_URL: postgres://postgres:postgres@db:5432/feedback
      SCRATCH_DIR: /scratch
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - scratch:/scratch
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: .
    # Drains the Postgres-backed task queue. Jobs are claimed with SELECT FOR
    # UPDATE SKIP LOCKED, so `docker compose up --scale worker=2` runs each
    # queued task exactly once.
    #
    # `--no-reload` and `restart` below are one decision, not two (#55). The
    # worker does NOT reload on code changes, and web still does; that is the
    # trade, and here is what was bought with it.
    #
    # `db_worker` defaults `--reload` to DEBUG, which is true here. Django's
    # autoreloader runs the worker in a daemon thread and watches files from
    # the main thread. When the worker thread dies the reloader does not
    # notice: it keeps ticking, the process stays alive, `docker compose ps`
    # keeps saying `Up`, and nothing drains the queue. QA hit exactly this on
    # #18 by starting a worker against a database that did not yet have the
    # queue migrations - and it never came back once the migrations landed,
    # because nothing was left running to come back. A queue that has silently
    # stopped being served, on a stack that reads healthy, is the worst
    # failure mode this service has.
    #
    # Without the reloader the traceback reaches the top of a single process,
    # the container exits non-zero, and the status becomes `Restarting` or
    # `Exited` instead of `Up`. `restart: on-failure` then brings the worker
    # back the moment the cause is fixed, with no manual `docker compose up` -
    # a crash loop that heals itself once the database, the code or the
    # network it was failing on is right again. `on-failure` and not
    # `unless-stopped`: an exit code of 0 is a worker that was asked to stop
    # (SIGTERM from `docker compose stop`, or `--batch` draining the queue and
    # finishing), and that must stay stopped.
    #
    # A healthcheck was the alternative and was rejected twice over. The queue
    # tables carry no worker heartbeat, so a probe would have to invent one in
    # application code; and Compose does not restart an unhealthy container -
    # only Swarm does - so it would report the fault without ever fixing it,
    # which fails the second half of #55.
    #
    # The cost: after editing a task, `docker compose restart worker`. That is
    # one command, in exchange for a worker that cannot lie about being alive.
    command: uv run manage.py db_worker --no-reload
    restart: on-failure
    environment:
      DEBUG: "true"
      SECRET_KEY: django-insecure-development-only-key
      DATABASE_URL: postgres://postgres:postgres@db:5432/feedback
      SCRATCH_DIR: /scratch
    volumes:
      - .:/app
      - scratch:/scratch
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  scratch:
