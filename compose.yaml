name: project-feedback

services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: feedback
    ports:
      # Exposed so the suite can also be run on the host with `uv run pytest`.
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d feedback"]
      interval: 5s
      timeout: 5s
      retries: 12

  web:
    build: .
    command: uv run manage.py runserver 0.0.0.0:8000
    environment:
      DEBUG: "true"
      SECRET_KEY: django-insecure-development-only-key
      ALLOWED_HOSTS: localhost,127.0.0.1,web
      DATABASE_URL: postgres://postgres:postgres@db:5432/feedback
      SCRATCH_DIR: /scratch
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - scratch:/scratch
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: .
    # Placeholder until #18 brings the task backend. It has to stay up so the
    # shared scratch volume and the service wiring are exercised.
    command: >
      sh -c "echo 'worker: no task backend yet (see #18), idling'; tail -f /dev/null"
    environment:
      DEBUG: "true"
      SECRET_KEY: django-insecure-development-only-key
      DATABASE_URL: postgres://postgres:postgres@db:5432/feedback
      SCRATCH_DIR: /scratch
    volumes:
      - .:/app
      - scratch:/scratch
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  scratch:
