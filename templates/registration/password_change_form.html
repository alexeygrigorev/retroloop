{% extends "base_app.html" %}

{% block title %}Change password{% endblock %}

{% block content %}
  <h1 class="text-2xl font-semibold tracking-tight">Change password</h1>

  <form method="post" class="mt-6 flex max-w-sm flex-col gap-2">
    {% csrf_token %}
    {{ form.as_p }}
    <button
      type="submit"
      class="mt-2 self-start rounded-md bg-brand-600 px-3 py-2 text-sm font-medium text-white
             hover:bg-brand-700"
    >
      Change password
    </button>
  </form>

  <p class="mt-6 text-sm">
    <a href="{% url 'home' %}" class="text-brand-700 underline hover:text-brand-600">Back</a>
  </p>
{% endblock %}
