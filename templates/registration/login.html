{# Plain and unstyled until task 3 lands a base layout to extend. #}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Log in</title>
  </head>
  <body>
    <h1>Log in</h1>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit">Log in</button>
    </form>

    <p>No account yet? <a href="{% url 'signup' %}">Sign up</a>.</p>
    <p>
      Forgotten your password? There is no self-serve reset — ask an
      administrator to set a new one.
    </p>
  </body>
</html>
