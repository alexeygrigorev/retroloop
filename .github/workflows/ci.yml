# The checks a human runs before merging, on every push.
#
# Green here has to mean what green means on a laptop. Two things in this
# project can turn a broken build into a passing summary line, and this
# workflow closes both: both assets - the stylesheet and the React island's
# bundle - are built here rather than assumed, and any skipped test fails the
# job. A run that would read `72 passed, 1 skipped` is red.
name: CI

# Every branch, because engineers push branches and the orchestrator merges
# locally: a workflow that only fired on main would tell an engineer nothing
# until after the merge. The pull_request trigger is there for the day a
# contribution arrives as a PR; the duplicate run is accepted and concurrency
# keeps the cost down. No paths filter - several tests read AGENTS.md,
# README.md, package.json and .gitignore as fixtures, so a documentation-only
# commit can and does break the suite.
on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Read-only. Nothing here publishes, comments or uploads.
permissions:
  contents: read

# A newer push to the same ref cancels the run it supersedes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint, migrations, assets, suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      # The same image as compose.yaml, as a service container rather than
      # Compose: bringing up Compose would build the application image - the
      # static-ffmpeg copy, the whole dependency layer - purely to obtain a
      # database, and the web and worker services are not wanted in a test job.
      # compose.yaml's max_connections=300 is deliberately not copied. It is
      # there because one container serves every developer worktree at once;
      # this job runs one suite alone and the postgres:18 default of 100 is
      # ample.
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: feedback_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d feedback_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      # A real environment variable, and no dotenv file anywhere in this job.
      # config/settings.py seeds os.environ with setdefault, so a real variable
      # wins by design - that is the production path, and CI travels it rather
      # than fabricating a file. The database is deliberately feedback_ci and
      # not feedback: the fallback baked into config/settings.py ends in
      # /feedback, so the settings line logged below is proof the variable
      # arrived rather than a coincidence that matches the default.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/feedback_ci
      # `manage.py makemigrations --check` loads production settings, which
      # refuse to start without a key while DEBUG is off. The same visibly-fake
      # value compose.yaml uses; a throwaway that never leaves the runner, not a
      # new setting and not a credential.
      DEBUG: "false"
      SECRET_KEY: django-insecure-development-only-key
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      # Every `uv run` below works from the committed lock file instead of
      # re-resolving against the index, the rule the Dockerfile already applies.
      UV_FROZEN: "1"
      # The same resolver window uv.lock was resolved with, which it records as
      # `exclude-newer-span = "P7D"`. It comes from a machine-level uv config on
      # the developer side, and a runner has no such config: without it uv sees
      # the window removed, re-resolves, and `uv sync --locked` fails on a lock
      # file nobody touched. tests/test_ci_workflow.py keeps this value and the
      # one in uv.lock in step, and says to drop it if the lock stops recording
      # a span.
      UV_EXCLUDE_NEWER: "7 days"
      # Written outside the checkout so the suite's own walks over the working
      # tree never see it.
      JUNIT_REPORT: ${{ github.workspace }}/../junit.xml
      # The committed shape of the suite: how many tests it runs, and which files
      # define them. One line each, read by both gates below - the JUnit count
      # gate and the collection/set gate. Every branch that changes the number of
      # tests edits EXPECTED_TESTS; every branch that adds, removes or renames a
      # test file edits TEST_FILES. Neither is a floor: too many is as red as too
      # few, and a file that leaves the set is as red as one that arrives. Both
      # are declared here, once, so the same commit that changes the suite moves
      # one line and the diff shows it. The failing gate prints the line to
      # paste. It is never edited to make a red build green - the whole point is
      # that it cannot be, because tests/test_ci_workflow.py collects the real
      # suite and the workflow re-collects it in a step that runs whatever pytest
      # collects, so a value the suite does not produce fails on its own.
      EXPECTED_TESTS: "23"
      TEST_FILES: "test_asset_fixture.py test_audio.py test_auth.py test_board.py test_cards.py test_ci_workflow.py test_compose_worker.py test_cycles.py test_home.py test_island.py test_layout.py test_media_sweeper.py test_meetings.py test_permissions.py test_projects.py test_public_id.py test_retro.py test_reveal.py test_styling.py test_tasks.py test_template_comments.py test_template_urls.py test_transcription.py"

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python dependencies
        # --locked, never a bare `uv sync`: the lock file has to already agree
        # with pyproject.toml, and a drifted lock fails here instead of being
        # silently repaired. UV_FROZEN is 0 for this one step because uv refuses
        # --locked while UV_FROZEN is set - the two mean opposite things, and
        # the check is what is wanted at install time. The job-level UV_FROZEN=1
        # governs every `uv run` after it.
        env:
          UV_FROZEN: "0"
        run: uv sync --locked

      - name: Log the Python version
        # requires-python pins ==3.14.*; uv installs the interpreter that
        # satisfies it.
        run: |
          uv run python -c "import sys; print(sys.version)"
          uv run python -c "import sys; assert sys.version.startswith('3.14.'), sys.version"

      - name: Log the database the settings resolved to
        # Must print feedback_ci. Anything else - feedback in particular - means
        # DATABASE_URL never reached Django and the suite is running on a
        # default it did not choose.
        run: uv run python -c "import config.settings_test as s; print(s.DATABASES['default']['NAME'])"

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Missing migration check
        # A model change with no migration is a FAIL during human QA on this
        # project. Run against production settings on purpose: it also proves
        # config/settings.py still imports.
        run: uv run manage.py makemigrations --check --dry-run

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Build the stylesheet
        # The workflow builds the assets itself. It does not rely on a test
        # fixture to do it, because building assets is the workflow's job and
        # must not be a side effect that a later refactor can remove.
        run: npm run build:css

      - name: Check the stylesheet was built
        run: |
          css=static/css/app.css
          if [ ! -f "$css" ]; then
            echo "::error::$css does not exist. 'npm run build:css' did not produce the stylesheet."
            exit 1
          fi
          size=$(stat -c %s "$css")
          if [ "$size" -le 1024 ]; then
            echo "::error::$css is only $size bytes. 'npm run build:css' did not produce a real stylesheet."
            exit 1
          fi
          echo "$css is $size bytes."

      - name: Build the React island
        # The second built artefact, and the same rule as the stylesheet above:
        # a workflow that builds only one of the two assets is green while the
        # other build is broken, which is the hole this job exists to close.
        # `npm run build:js` is the production build AGENTS.md documents - one
        # build path, no dev server (that is #39) - and it reuses the `npm ci`
        # already done, so no second install step appears here.
        run: npm run build:js

      - name: Check the bundle and its manifest were built
        # The manifest path is read out of config/settings.py rather than
        # written down a second time, so this step checks the very file
        # retro/templatetags/vite.py will open. Production settings on purpose:
        # config/settings_test.py points VITE_MANIFEST at a checked-in fixture
        # so the Python suite runs on a machine with no Node, and a check
        # against the fixture would pass with nothing built at all.
        run: |
          uv run python - <<'PY'
          import json
          import sys
          from pathlib import Path

          import config.settings as settings

          manifest = Path(settings.VITE_MANIFEST)
          if not manifest.is_file():
              print(f"::error::{manifest} does not exist. 'npm run build:js' did not write the manifest.")
              sys.exit(1)

          try:
              entries = json.loads(manifest.read_text())
          except json.JSONDecodeError as error:
              print(f"::error::{manifest} is not valid JSON ({error}). 'npm run build:js' wrote a manifest nothing can read.")
              sys.exit(1)

          bundles = [manifest.parent / entry["file"] for entry in entries.values() if entry.get("isEntry")]
          if not bundles:
              print(f"::error::{manifest} names no entry bundle. 'npm run build:js' produced a manifest the page cannot use.")
              sys.exit(1)

          for bundle in bundles:
              if not bundle.is_file():
                  print(f"::error::{bundle}, named by {manifest}, does not exist. 'npm run build:js' did not write the bundle.")
                  sys.exit(1)
              size = bundle.stat().st_size
              # Larger than 1 KB, the same floor the stylesheet check uses: a
              # build that produced an empty file produced nothing.
              if size <= 1024:
                  print(f"::error::{bundle} is only {size} bytes. 'npm run build:js' did not produce a real bundle.")
                  sys.exit(1)
              print(f"{bundle} is {size} bytes.")
          PY

      - name: Collect the static files
        # What a deployment does with the build output. It is the step that
        # proves the bundle and the manifest sit where Django's finders look,
        # not merely somewhere on disk, and it fails loudly on a manifest left
        # inside Vite's default hidden .vite/ directory, which collectstatic
        # skips. Production settings again - manage.py defaults to them.
        run: uv run manage.py collectstatic --noinput

      - name: Install ffmpeg and ffprobe
        # The same 8.1 static build the Dockerfile copies from; Debian packages
        # 7.1. tests/test_audio.py carries a module-level skipif on these two
        # binaries, so without them nineteen tests - the whole media pipeline -
        # disappear from the run and the summary still reads green.
        run: |
          docker create --name static-ffmpeg mwader/static-ffmpeg:8.1 /ffmpeg
          sudo docker cp static-ffmpeg:/ffmpeg /usr/local/bin/ffmpeg
          sudo docker cp static-ffmpeg:/ffprobe /usr/local/bin/ffprobe

      - name: Log the ffmpeg version
        # Both have to answer from PATH, under the names the pipeline calls.
        run: |
          command -v ffmpeg
          command -v ffprobe
          ffmpeg -version
          ffprobe -version

      - name: Run the test suite
        # -rs so the log names every skip and its reason, and a JUnit report for
        # the gate below.
        run: uv run pytest -rs --junitxml="$JUNIT_REPORT"

      - name: Fail if the number of tests that ran is not the expected count
        # The skip gate below reads <skipped> elements, and a test that is never
        # collected writes no <testcase> at all - so removing a whole file from
        # collection is invisible to it. QA proved that: `--ignore=tests/...` in
        # addopts produced a fully green run with a fifth of the suite gone. The
        # count of tests that ran is therefore checked as well.
        #
        # It is an exact count and not a floor (#72). A floor only ever fails on
        # a build that is already failing, so the reminder to raise it prints on
        # a green run in a step nobody opens, and it goes stale: the number was
        # left behind twice in one day. Worse, a floor can be edited downwards to
        # make a red build green, which is the one edit it exists to prevent.
        # An exact count is maintained by construction - every change to the size
        # of the suite has to move EXPECTED_TESTS (declared once in the job env
        # above) in the same commit, and the diff shows it. This gate reads the
        # JUnit report the suite wrote; the collection/set gate further down
        # re-collects the suite itself and pins its file set as well.
        run: |
          python3 - <<'PY'
          import os
          import sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          report = Path(os.environ["JUNIT_REPORT"])
          expected = int(os.environ["EXPECTED_TESTS"])
          if not report.is_file():
              sys.exit(f"::error::{report} is missing - pytest wrote no report.")

          root = ET.parse(report).getroot()
          ran = sum(int(suite.get("tests", 0)) for suite in root.iter("testsuite"))
          if ran != expected:
              print(f"::error::{ran} test(s) ran, expected exactly {expected}.")
              if ran < expected:
                  print(f"  {expected - ran} test(s) that this suite is known to run did not")
                  print("  run at all. A test dropped from collection writes no result, so the")
                  print("  skip gate cannot see it - this count is what catches it. Look for an")
                  print("  --ignore in addopts, a collect_ignore in tests/conftest.py, or a file")
                  print("  that left the tree, and be sure the loss is intended before you")
                  print("  change the number below.")
              else:
                  print(f"  The suite grew by {ran - expected} test(s).")
              print("  When the change is intended, the fix is one line in")
              print(f'  .github/workflows/ci.yml: EXPECTED_TESTS: "{ran}".')
              print("  Change it in the same commit that changes the suite. Every branch that")
              print("  adds or removes a test moves this line, including yours.")
              sys.exit(1)

          print(f"{ran} test(s) ran, exactly the expected {expected}.")
          PY

      - name: Fail if any test was skipped
        # A skipped test is a failed test here. Both of this project's silent
        # opt-outs - the collectstatic test and all of tests/test_audio.py -
        # vanish from a naive run and leave the summary line green, which is the
        # failure this workflow exists to close. A test that genuinely has to
        # skip changes this gate in the same commit, with the reason written
        # here. The report is parsed with the standard library; no parser is
        # installed for it.
        run: |
          python3 - <<'PY'
          import os
          import sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          report = Path(os.environ["JUNIT_REPORT"])
          if not report.is_file():
              sys.exit(f"::error::{report} is missing - pytest wrote no report.")

          skipped = [
              (
                  "{}::{}".format(case.get("classname", ""), case.get("name", "")),
                  skip.get("message", ""),
              )
              for case in ET.parse(report).iter("testcase")
              for skip in case.findall("skipped")
          ]
          if skipped:
              print(f"::error::{len(skipped)} test(s) skipped. A skipped test fails CI.")
              for node, reason in skipped:
                  print(f"  skipped: {node} - {reason}")
              sys.exit(1)

          print("No test skipped.")
          PY

      - name: Fail if the set of test files or the number collected has changed
        # The gates above read the JUnit report the suite wrote. That is enough
        # to catch a run that lost tests, but not a suite whose shape was changed
        # so that the loss is invisible to a report:
        #
        #   - A test file removed from the suite - renamed off the test_*.py
        #     convention, or `git rm`'d - with an equal number of cases added
        #     elsewhere. The count is unchanged, nothing is skipped, and the file
        #     that used to be there writes no result to miss. The report cannot
        #     see it; the tests/ directory can.
        #   - A collect_ignore or an --ignore in addopts, which drops a whole
        #     file from collection. The file is still on disk, so a run that also
        #     lowers EXPECTED_TESTS is consistent with itself.
        #   - A pytest_collection_modifyitems hook that thins the suite to a
        #     handful of tests. Run and report agree on the thinned number.
        #
        # And, the reason this is a job step and not a test: the checks the suite
        # carries for its own count live in tests/test_ci_workflow.py, which is a
        # collected file. Anything that removes THAT file from collection - the
        # #30 --ignore hole pointed at the guard - disables the guard and is
        # invisible to it. This step runs whatever pytest collects, so it fires
        # even when the file that would have checked it is the file that is gone.
        #
        # It collects the suite itself, with a plugin that counts every item as
        # it is collected (pytest_itemcollected, before modifyitems runs) and
        # again after (session.items). A hook that deselects during collection
        # makes the two disagree. The plugin is written outside the checkout, so
        # the suite's own walks over the tree never see it and it cannot be the
        # file that is dropped. EXPECTED_TESTS and TEST_FILES are the two
        # committed facts about the suite, declared once in the job env above;
        # the failure below prints the exact line to paste for whichever moved.
        run: |
          plugin_dir="$(mktemp -d)"
          cat > "$plugin_dir/_ci_collect.py" <<'PLUGIN'
          import json
          import os

          _raw = 0


          def pytest_itemcollected(item):
              # Fires once per item as it is collected, before
              # pytest_collection_modifyitems can remove any. This is the count
              # of tests the files actually define.
              global _raw
              _raw += 1


          def pytest_collection_finish(session):
              # session.items is what survives modifyitems - what would run.
              payload = {
                  "raw": _raw,
                  "items": len(session.items),
                  "files": sorted({item.nodeid.split("::", 1)[0] for item in session.items}),
              }
              with open(os.environ["CI_COLLECT_OUT"], "w") as handle:
                  json.dump(payload, handle)
          PLUGIN
          out="$(mktemp)"
          CI_COLLECT_OUT="$out" PYTHONPATH="$plugin_dir" \
            uv run pytest --collect-only -q -p _ci_collect -p no:cacheprovider >/dev/null
          CI_COLLECT_OUT="$out" python3 - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          result = json.loads(Path(os.environ["CI_COLLECT_OUT"]).read_text())
          expected = int(os.environ["EXPECTED_TESTS"])
          manifest = sorted(os.environ["TEST_FILES"].split())
          tests_dir = Path(os.environ.get("TESTS_DIR", "tests"))

          raw = result["raw"]
          items = result["items"]
          collected_files = {Path(name).name for name in result["files"]}
          on_disk = sorted(path.name for path in tests_dir.glob("test_*.py"))

          errors = []

          # 1. The set of test files is exactly the committed list. Catches a file
          #    added (unlisted), removed, or renamed - none of which changes a
          #    count that was balanced elsewhere.
          if on_disk != manifest:
              added = sorted(set(on_disk) - set(manifest))
              gone = sorted(set(manifest) - set(on_disk))
              detail = []
              if added:
                  detail.append(f"added and unlisted: {', '.join(added)}")
              if gone:
                  detail.append(f"listed but not on disk: {', '.join(gone)}")
              errors.append(
                  f"::error::the set of {tests_dir}/test_*.py files is not the committed set "
                  f"({'; '.join(detail)})."
              )
              errors.append("  A test file added, removed or renamed changes the suite. When the")
              errors.append("  change is intended, the fix is one line in .github/workflows/ci.yml:")
              errors.append(f'  TEST_FILES: "{" ".join(on_disk)}"')

          # 2. Every committed file actually contributed a collected test. Catches
          #    an --ignore or a collect_ignore that drops a listed file - including
          #    tests/test_ci_workflow.py itself, the file that guards the count.
          silent = [name for name in manifest if name not in collected_files]
          if silent:
              errors.append(
                  f"::error::{', '.join(silent)} is listed in TEST_FILES but pytest collected "
                  "nothing from it."
              )
              errors.append("  A listed file that collects nothing has been dropped from the run -")
              errors.append("  look for an --ignore in addopts or a collect_ignore in a conftest.")

          # 3. Nothing was deselected during collection. Catches a
          #    pytest_collection_modifyitems hook that thins the suite: the items
          #    were collected (raw counts them) and then removed (items is fewer).
          if raw != items:
              errors.append(
                  f"::error::{raw - items} test(s) were removed during collection "
                  f"({raw} collected, {items} kept). A pytest_collection_modifyitems hook is "
                  "deselecting tests; the run is not the suite."
              )

          # 4. The number collected is the committed number. This is the count the
          #    JUnit gate also checks, but measured at collection - a report that
          #    was thinned to match a lowered EXPECTED_TESTS still fails here,
          #    because raw (above) does not thin with it.
          if items != expected:
              errors.append(f"::error::{items} test(s) collected, expected exactly {expected}.")
              errors.append("  When the change is intended, the fix is one line in")
              errors.append(f'  .github/workflows/ci.yml: EXPECTED_TESTS: "{items}".')
              errors.append("  Change it in the same commit that changes the suite.")

          if errors:
              print("\n".join(errors))
              sys.exit(1)

          print(f"{items} test(s) collected across {len(manifest)} files, exactly as committed.")
          PY
